<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Filler</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            width: 340px;
            background: #080c14;
            color: #e2e8f0;
        }

        .header {
            background: linear-gradient(135deg, #0a1628, #0f2040);
            padding: 14px 16px;
            border-bottom: 1px solid #1e2d42;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h2 {
            font-size: 14px;
            font-weight: 700;
        }

        .section {
            padding: 14px 16px;
            border-bottom: 1px solid #1a2638;
        }

        .section-title {
            font-size: 11px;
            font-weight: 700;
            color: #3b82f6;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .status-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #64748b;
            margin-bottom: 10px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #64748b;
        }

        .status-dot.green {
            background: #10b981;
            animation: pulse 1.5s infinite;
        }

        .status-dot.red {
            background: #ef4444;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        textarea {
            width: 100%;
            height: 80px;
            background: #0f1623;
            color: #e2e8f0;
            border: 1px solid #1e3a5f;
            border-radius: 8px;
            padding: 10px;
            font-size: 11px;
            resize: none;
            outline: none;
        }

        button {
            width: 100%;
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 13px;
            margin-top: 8px;
            transition: all 0.2s;
        }

        button:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        button.secondary {
            background: #141e2e;
            border: 1px solid #1e3a5f;
            color: #94a3b8;
        }

        button.success {
            background: #10b981;
        }

        button:disabled {
            background: #1e2d42;
            color: #475569;
            cursor: not-allowed;
        }

        .task-list {
            max-height: 180px;
            overflow-y: auto;
        }

        .task-item {
            background: #0f1623;
            border: 1px solid #1e3a5f;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            cursor: pointer;
        }

        .task-item.selected {
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.05);
        }

        .task-domain {
            font-size: 12px;
            font-weight: 700;
            color: #3b82f6;
            margin-bottom: 2px;
        }

        .task-desc {
            font-size: 11px;
            color: #64748b;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .status-msg {
            font-size: 12px;
            text-align: center;
            margin-top: 8px;
            padding: 8px;
            border-radius: 6px;
            min-height: 32px;
        }

        .status-msg.ok {
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
        }

        .status-msg.err {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }

        .empty {
            color: #475569;
            font-size: 12px;
            text-align: center;
            padding: 16px 0;
        }

        .footer {
            padding: 10px;
            font-size: 10px;
            color: #334155;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">🚀</div>
        <h2>Super Advanced Auto-Filler</h2>
    </div>
    <div class="section">
        <div class="status-row">
            <div class="status-dot" id="server-dot"></div>
            <span id="server-status">Connecting...</span>
        </div>
        <button id="fill-tab-btn" disabled>✨ Auto-Fill This Page</button>
    </div>
    <div class="section">
        <div class="section-title">📋 Dashboard Tasks</div>
        <div id="task-list" class="task-list">
            <div class="empty">Scanning for tasks...</div>
        </div>
        <button id="refresh-tasks-btn" class="secondary">↻ Refresh</button>
        <button id="open-selected-btn" class="success" style="display:none">🔥 Launch & Fill</button>
    </div>
    <div class="section">
        <div class="section-title">🔗 Bulk URLs</div>
        <textarea id="urlsInput" placeholder="Paste LinkedIn/Workday links here..."></textarea>
        <button id="openTabsBtn">Process All Tabs</button>
    </div>
    <div class="status-msg" id="statusMsg"></div>
    <div class="footer">DeepSeek/Qwen + Gemini Enabled</div>
    <script src="popup.js"></script>
</body>

</html>
