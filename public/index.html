<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Apply Dashboard</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: var(--accent);
            margin-bottom: 30px;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
            margin-bottom: 20px;
        }
        button:hover { background-color: var(--accent-hover); }
        button:disabled { background-color: var(--text-muted); cursor: not-allowed; }

        #terminal {
            background-color: #000;
            color: #00ff00;
            font-family: monospace;
            padding: 15px;
            border-radius: 8px;
            height: 300px;
            overflow-y: auto;
            white-space: pre-wrap;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .task-card {
            background-color: rgba(255, 255, 255, 0.05);
            border-left: 4px solid var(--accent);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 4px 8px 8px 4px;
        }
        .task-date { font-size: 12px; color: var(--text-muted); }
        .task-link {
            display: inline-block;
            background-color: var(--success);
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            margin-top: 10px;
            font-weight: bold;
        }
        .history-line {
            font-size: 13px;
            color: var(--text-muted);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 8px 0;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            background-color: var(--card-bg);
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .tab.active {
            background-color: var(--accent);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Auto-Apply Dashboard</h1>

    <button id="btn-trigger" onclick="triggerScript()">Fetch & Apply Now</button>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('logs')">Live Logs</div>
        <div class="tab" onclick="switchTab('tasks')">Manual Tasks</div>
        <div class="tab" onclick="switchTab('history')">History</div>
    </div>

    <!-- LOGS TAB -->
    <div id="tab-logs" class="tab-content active card">
        <div class="header-flex">
            <h3 style="margin:0;">Terminal Output</h3>
            <span id="status-badge" style="color: var(--text-muted)">Idle</span>
        </div>
        <div id="terminal">Waiting to run...</div>
    </div>

    <!-- TASKS TAB -->
    <div id="tab-tasks" class="tab-content card">
        <div class="header-flex">
            <h3 style="margin:0;">Manual Application Links</h3>
            <button onclick="fetchTasks()" style="width:auto; margin:0; padding: 6px 12px; font-size:14px;">Refresh</button>
        </div>
        <p style="font-size: 14px; color: var(--text-muted);">These jobs used Google Forms or external links instead of emails. Apply manually here:</p>
        <div id="tasks-container">Loading...</div>
    </div>

    <!-- HISTORY TAB -->
    <div id="tab-history" class="tab-content card">
        <div class="header-flex">
            <h3 style="margin:0;">Recent Job History</h3>
            <button onclick="fetchHistory()" style="width:auto; margin:0; padding: 6px 12px; font-size:14px;">Refresh</button>
        </div>
        <div id="history-container">Loading...</div>
    </div>

</div>

<script>
    let pollInterval;

    function switchTab(tabName) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

        event.target.classList.add('active');
        document.getElementById('tab-' + tabName).classList.add('active');

        if (tabName === 'tasks') fetchTasks();
        if (tabName === 'history') fetchHistory();
    }

    async function triggerScript() {
        const btn = document.getElementById('btn-trigger');
        btn.disabled = true;
        btn.innerText = "Running...";
        document.getElementById('status-badge').innerText = "🟢 Running";
        document.getElementById('status-badge').style.color = "var(--success)";

        document.getElementById('terminal').innerText = "Initializing...\n";

        try {
            await fetch('/api/trigger', { method: 'POST' });
            startPolling();
        } catch (e) {
            alert('Failed to start script');
            btn.disabled = false;
            btn.innerText = "Fetch & Apply Now";
        }
    }

    function startPolling() {
        clearInterval(pollInterval);
        pollInterval = setInterval(async () => {
            const res = await fetch('/api/logs');
            const data = await res.json();

            const term = document.getElementById('terminal');
            term.innerText = data.logs || "Waiting for output...";
            term.scrollTop = term.scrollHeight;

            if (!data.isRunning) {
                clearInterval(pollInterval);
                const btn = document.getElementById('btn-trigger');
                btn.disabled = false;
                btn.innerText = "Fetch & Apply Now";
                document.getElementById('status-badge').innerText = "Idle";
                document.getElementById('status-badge').style.color = "var(--text-muted)";

                // Refresh other tabs when done
                fetchTasks();
                fetchHistory();
            }
        }, 1000);
    }

    async function fetchTasks() {
        const res = await fetch('/api/manual-tasks');
        const tasks = await res.json();
        const container = document.getElementById('tasks-container');

        if (tasks.length === 0) {
            container.innerHTML = "<p>No manual tasks found.</p>";
            return;
        }

        container.innerHTML = tasks.map(t => `
            <div class="task-card">
                <div class="task-date">Found on: ${new Date(t.date).toLocaleString()}</div>
                <p><strong>Job Details:</strong><br>${t.description.replace(/\n/g, '<br>')}</p>
                <a href="${t.link}" target="_blank" class="task-link">Open Link to Apply</a>
            </div>
        `).join('');
    }

    async function fetchHistory() {
        const res = await fetch('/api/history');
        const history = await res.json();
        const container = document.getElementById('history-container');

        if (history.length === 0) {
            container.innerHTML = "<p>No history found.</p>";
            return;
        }

        container.innerHTML = history.map(h => `<div class="history-line">${h}</div>`).join('');
    }

    // Initial fetch
    fetchTasks();
    fetchHistory();
</script>

</body>
</html>
